backend:
  name: git-gateway
  repo: pacosimscc-cmd/hugo-theme-stack-starter
  branch: master

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "post"
    label: "CC ve Yazılar"
    folder: "content/post"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Başlık", name: "title", widget: "string"}
      - {label: "Tarih", name: "date", widget: "datetime"}
      - {label: "Açıklama", name: "description", widget: "text"}
      - {label: "Öne Çıkan Görsel", name: "image", widget: "image"}
      - {label: "Kategori", name: "categories", widget: "list"}
      - {label: "İçerik", name: "body", widget: "markdown"}