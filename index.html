<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PacoSims | Custom Content</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f4;">
  
  <h1>PacoSims is Online!</h1>
  <p>Welcome to the home of PacoSims Custom Content.</p>
  
  <div style="margin-top: 20px;">
    <a href="/admin/" style="text-decoration: none; background-color: #00ad9f; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold;">Go to Admin Panel</a>
  </div>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
